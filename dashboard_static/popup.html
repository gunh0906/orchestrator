<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<style>
body{margin:0;font-family:'Segoe UI','Noto Sans KR',sans-serif;background:#f1f5f9;color:#0f172a}
.top{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-bottom:1px solid #e2e8f0;color:#0f172a}
.top div:first-child{font-weight:700;font-size:14px}
.btn{height:32px;border:none;border-radius:8px;padding:0 14px;background:#2d4b9b;color:#fff;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
#txt{width:100%;height:calc(100vh - 48px);box-sizing:border-box;border:0;outline:none;padding:16px;font-family:Consolas,'Courier New',monospace;font-size:12.5px;background:#ffffff;color:#0f172a;white-space:pre;resize:none}
</style>
</head>
<body>
<div class="top"><div>__TITLE__</div><div><button class="btn" id="copyBtn">Copy</button></div></div>
<textarea id="txt" readonly>__TEXT__</textarea>
<script>
document.getElementById('copyBtn').onclick=async()=>{
  const v=document.getElementById('txt').value;
  try{
    await navigator.clipboard.writeText(v);
  }catch(e){
    document.getElementById('txt').select();
    document.execCommand('copy');
  }
};
</script>
</body>
</html>
